# ============================================================
# HireAI — GitHub Actions CI/CD Pipeline
#
# Trigger: push to `main`
# Auth:    AWS IAM OIDC (no stored AWS keys in GitHub Secrets)
# Steps:   Terraform apply → Docker build → ECR push → ECS deploy
# ============================================================

name: HireAI — Deploy to AWS

on:
  push:
    branches: [development]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  id-token: write   # Required for OIDC token generation
  contents: read

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}         # e.g. ap-south-1
  AWS_ACCOUNT_ID:  ${{ secrets.AWS_ACCOUNT_ID }}     # e.g. 123456789012
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}     # e.g. hireai-backend
  ECS_CLUSTER:     hireai-cluster
  ECS_SERVICE:     hireai-backend
  TF_DIR:          infra/terraform

jobs:
  # ── Job 1: Terraform ────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/hireai-github-actions
          role-session-name: GitHubActions-Terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="github_repo_owner=Ashishds" \
            -var="github_repo_name=ai-interview"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

  # ── Job 2: Build & Push Docker Image ────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: terraform   # Only after infra is ready
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/hireai-github-actions
          role-session-name: GitHubActions-Docker
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        working-directory: backend
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          # Build image with both git SHA tag and 'latest'
          docker build \
            --tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$REGISTRY/$ECR_REPOSITORY:latest" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="$IMAGE_TAG" \
            --cache-from "$REGISTRY/$ECR_REPOSITORY:latest" \
            .

          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

          # Output the image URI for the deploy job
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Job 3: Deploy to ECS ────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/hireai-github-actions
          role-session-name: GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service  "$ECS_SERVICE" \
            --force-new-deployment \
            --region   "$AWS_REGION"

      - name: Wait for ECS service to stabilise
        run: |
          echo "⏳ Waiting for ECS service to become stable..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region   "$AWS_REGION"
          echo "✅ ECS service is stable."

      - name: Deployment summary
        run: |
          echo "🚀 Deployment complete!"
          echo "Image: ${{ needs.build-and-push.outputs.image }}"
          echo "Cluster: $ECS_CLUSTER"
          echo "Service: $ECS_SERVICE"
          echo "Region: $AWS_REGION"
